<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        /* Responsive Foundation */
        :root {
            /* Breakpoint values for reference and potential JS usage */
            --breakpoint-mobile: 0;
            --breakpoint-tablet: 640px;
            --breakpoint-desktop: 1024px;
            --breakpoint-wide: 1280px;
        }
        
        /* Base box-sizing for consistent sizing */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }
        
        /* Responsive media elements - Story 5 */
        img,
        video,
        embed,
        iframe,
        object,
        svg {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        /* Preserve aspect ratio for SVGs */
        svg {
            overflow: hidden;
        }
        
        /* Video container for responsive embeds */
        .video-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
        }
        
        .video-container iframe,
        .video-container embed,
        .video-container object {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <div class="w-full max-w-3xl mx-auto px-4 sm:px-6 md:px-8 lg:px-12 py-8 sm:py-12 md:py-16">
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-white mb-6 sm:mb-8 md:mb-10 text-center">
            Contact Us
        </h1>
        
        <div id="success-message" class="hidden bg-green-500/20 border border-green-400/50 text-green-200 px-4 sm:px-6 py-3 sm:py-4 rounded-lg sm:rounded-xl mb-4 sm:mb-6 text-sm sm:text-base md:text-lg">
            Thank you for your message! We'll get back to you soon.
        </div>
        
        <form id="contactForm" method="POST" action="/api/contact" class="bg-white/10 backdrop-blur-md rounded-xl sm:rounded-2xl p-4 sm:p-6 md:p-8 border border-white/10 shadow-xl">
            <!-- Honeypot field for spam protection -->
            <input type="text" name="website" class="hidden" tabindex="-1" autocomplete="off">
            
            <div class="form-group mb-4 sm:mb-5 md:mb-6">
                <label for="fullName" class="block mb-1.5 sm:mb-2 text-sm sm:text-base md:text-lg font-semibold text-gray-200">
                    Full Name <span class="text-red-400">*</span>
                </label>
                <input 
                    type="text" 
                    id="fullName" 
                    name="fullName" 
                    required 
                    minlength="2" 
                    maxlength="100"
                    placeholder="Enter your full name"
                    class="w-full px-3 sm:px-4 py-2 sm:py-2.5 md:py-3 bg-white/5 border border-white/20 rounded-lg sm:rounded-xl text-white placeholder-gray-400 text-sm sm:text-base md:text-lg focus:outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/50 transition-all"
                >
                <div id="fullName-error" class="text-red-400 text-xs sm:text-sm mt-1 sm:mt-1.5"></div>
            </div>
            
            <div class="form-group mb-4 sm:mb-5 md:mb-6">
                <label for="email" class="block mb-1.5 sm:mb-2 text-sm sm:text-base md:text-lg font-semibold text-gray-200">
                    Email Address <span class="text-red-400">*</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    maxlength="254"
                    placeholder="Enter your email address"
                    class="w-full px-3 sm:px-4 py-2 sm:py-2.5 md:py-3 bg-white/5 border border-white/20 rounded-lg sm:rounded-xl text-white placeholder-gray-400 text-sm sm:text-base md:text-lg focus:outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/50 transition-all"
                >
                <div id="email-error" class="text-red-400 text-xs sm:text-sm mt-1 sm:mt-1.5"></div>
            </div>
            
            <div class="form-group mb-4 sm:mb-5 md:mb-6">
                <label for="subject" class="block mb-1.5 sm:mb-2 text-sm sm:text-base md:text-lg font-semibold text-gray-200">
                    Subject <span class="text-red-400">*</span>
                </label>
                <input 
                    type="text" 
                    id="subject" 
                    name="subject" 
                    required
                    minlength="5" 
                    maxlength="200"
                    placeholder="What is this about?"
                    class="w-full px-3 sm:px-4 py-2 sm:py-2.5 md:py-3 bg-white/5 border border-white/20 rounded-lg sm:rounded-xl text-white placeholder-gray-400 text-sm sm:text-base md:text-lg focus:outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/50 transition-all"
                >
                <div id="subject-error" class="text-red-400 text-xs sm:text-sm mt-1 sm:mt-1.5"></div>
            </div>
            
            <div class="form-group mb-5 sm:mb-6 md:mb-8">
                <label for="body" class="block mb-1.5 sm:mb-2 text-sm sm:text-base md:text-lg font-semibold text-gray-200">
                    Message <span class="text-red-400">*</span>
                </label>
                <textarea 
                    id="body" 
                    name="body" 
                    required
                    minlength="10" 
                    maxlength="5000"
                    rows="5"
                    placeholder="Write your message here..."
                    class="w-full px-3 sm:px-4 py-2 sm:py-2.5 md:py-3 bg-white/5 border border-white/20 rounded-lg sm:rounded-xl text-white placeholder-gray-400 text-sm sm:text-base md:text-lg focus:outline-none focus:border-cyan-400 focus:ring-2 focus:ring-cyan-400/50 transition-all resize-y min-h-[120px] sm:min-h-[140px] md:min-h-[160px]"
                ></textarea>
                <div id="body-error" class="text-red-400 text-xs sm:text-sm mt-1 sm:mt-1.5"></div>
            </div>
            
            <button 
                type="submit"
                class="w-full sm:w-auto px-6 sm:px-8 md:px-10 py-2.5 sm:py-3 md:py-3.5 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-semibold rounded-lg sm:rounded-xl text-sm sm:text-base md:text-lg shadow-lg shadow-cyan-500/30 hover:shadow-xl hover:shadow-cyan-500/40 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:ring-offset-2 focus:ring-offset-slate-900"
            >
                Send Message
            </button>
        </form>
    </div>
    
    <script type="module" src="/src/index.css"></script>
    <script>
        // Client-side form validation
        const form = document.getElementById('contactForm');
        const successMessage = document.getElementById('success-message');
        
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }
        
        function showError(fieldId, message) {
            const errorEl = document.getElementById(fieldId + '-error');
            if (errorEl) {
                errorEl.textContent = message;
            }
        }
        
        function clearErrors() {
            document.querySelectorAll('[id$="-error"]').forEach(el => el.textContent = '');
        }
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            clearErrors();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const subject = document.getElementById('subject').value.trim();
            const body = document.getElementById('body').value.trim();
            
            let isValid = true;
            
            // Validate full name
            if (fullName.length < 2) {
                showError('fullName', 'Full name must be at least 2 characters');
                isValid = false;
            } else if (fullName.length > 100) {
                showError('fullName', 'Full name must not exceed 100 characters');
                isValid = false;
            }
            
            // Validate email
            if (!validateEmail(email)) {
                showError('email', 'Please enter a valid email address');
                isValid = false;
            }
            
            // Validate subject
            if (subject.length < 5) {
                showError('subject', 'Subject must be at least 5 characters');
                isValid = false;
            } else if (subject.length > 200) {
                showError('subject', 'Subject must not exceed 200 characters');
                isValid = false;
            }
            
            // Validate body
            if (body.length < 10) {
                showError('body', 'Message must be at least 10 characters');
                isValid = false;
            } else if (body.length > 5000) {
                showError('body', 'Message must not exceed 5000 characters');
                isValid = false;
            }
            
            if (!isValid) return;
            
            // Submit form
            const formData = { fullName, email, subject, body };
            
            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    successMessage.classList.remove('hidden');
                    form.reset();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    const error = await response.json();
                    alert('Error: ' + (error.message || 'Failed to send message'));
                }
            } catch (error) {
                alert('Error: Unable to send message. Please try again later.');
            }
        });
        
        // Real-time validation feedback
        document.getElementById('fullName').addEventListener('blur', function() {
            const value = this.value.trim();
            if (value.length > 0 && value.length < 2) {
                showError('fullName', 'Full name must be at least 2 characters');
            } else {
                showError('fullName', '');
            }
        });
        
        document.getElementById('email').addEventListener('blur', function() {
            const value = this.value.trim();
            if (value.length > 0 && !validateEmail(value)) {
                showError('email', 'Please enter a valid email address');
            } else {
                showError('email', '');
            }
        });
    </script>
</body>
</html>
