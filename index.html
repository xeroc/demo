<head>
    <meta charset="UTF-8">

    <style>
        /* Responsive Foundation */
        :root {
            /* Breakpoint values for reference and potential JS usage */
            --breakpoint-mobile: 0;
            --breakpoint-tablet: 640px;
            --breakpoint-desktop: 1024px;
            --breakpoint-wide: 1280px;
        }
        
        /* Base box-sizing for consistent sizing */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }
        
        /* Ensure body and html don't overflow horizontally */
        html,
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            width: 100%;
            max-width: 100vw;
        }
        
        /* Responsive media elements - Story 5 */
        img,
        video,
        embed,
        iframe,
        object,
        svg {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        /* Preserve aspect ratio for SVGs */
        svg {
            overflow: hidden;
        }
        
        /* Video container for responsive embeds */
        .video-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
        }
        
        .video-container iframe,
        .video-container embed,
        .video-container object {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
